<div class="flex flex-col gap-6 p-6 mt-16">
  <div class="flex items-center justify-center gap-4">
    <select
      class="rounded-lg border border-brand-300 bg-brand-950 px-4 py-2 text-white"
      [(ngModel)]="sourceType"
    >
      @for (item of dataList; track item.value) {
        @if(item.value !== targetType()) {
          <option [value]="item.value">{{item.label}}</option>
        }
      }
    </select>

    <button
      class="rounded-lg bg-brand-600 px-6 py-2 text-white transition hover:bg-brand-500"
      (click)="convert()"
    >
      Convertir →
    </button>

    <select
      class="rounded-lg border border-brand-300 bg-brand-950 px-4 py-2 text-white"
      [(ngModel)]="targetType"
    >
      @for (item of dataList; track item.value) {
        @if(item.value !== sourceType()) {
          <option [value]="item.value">{{item.label}}</option>
        }
      }
    </select>
  </div>

  <div class="flex gap-4">
    <textarea
      class="min-h-96 w-1/2 rounded-lg border border-brand-300 bg-brand-950 p-4 font-mono text-sm text-white placeholder-brand-400"
      placeholder="Pega tus datos de origen aquí..."
      [(ngModel)]="inputData"
    ></textarea>

    <textarea
      class="min-h-96 w-1/2 rounded-lg border border-brand-300 bg-brand-800 p-4 font-mono text-sm text-white placeholder-brand-400"
      placeholder="El resultado aparecerá aquí..."
      [(ngModel)]="outputData"
      readonly
    ></textarea>
  </div>
</div>
